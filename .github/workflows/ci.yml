name: Build CI

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'CHANGELOG.md'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: CGO_ENABLED=0 go build ./...

      - name: Vet
        run: go vet ./...

      - name: Extract version and branch tag
        id: tag
        run: |
          VERSION=$(grep -m 1 '^## \[' CHANGELOG.md | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' || echo "0.0.0")
          BRANCH=$(echo "${GITHUB_REF_NAME}" | sed 's/[^a-zA-Z0-9._-]/-/g')
          echo "value=${VERSION}-${BRANCH}" >> $GITHUB_OUTPUT
          echo "✅ Docker tag: ${VERSION}-${BRANCH}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        run: make build TAG=${{ steps.tag.outputs.value }} && make push TAG=${{ steps.tag.outputs.value }}
